<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Energy Flow 2026</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-title">
      <h1>World <span>Energy</span> Flow</h1>
      <span class="header-year">2026</span>
    </div>
    <div class="toggles">
      <label class="toggle-label oil">
        <input type="checkbox" data-layer="oil" checked/>
        <span class="toggle-dot"></span>
        🛢 Těžba ropy
      </label>
      <label class="toggle-label gas">
        <input type="checkbox" data-layer="gas" checked/>
        <span class="toggle-dot"></span>
        🔥 Plynovody &amp; LNG
      </label>
      <label class="toggle-label pipeline">
        <input type="checkbox" data-layer="pipeline" checked/>
        <span class="toggle-dot"></span>
        🔶 Ropovody
      </label>
      <label class="toggle-label ship">
        <input type="checkbox" data-layer="ship" checked/>
        <span class="toggle-dot"></span>
        ⛴ Tankery
      </label>
      <label class="toggle-label russia">
        <input type="checkbox" data-layer="russia" checked/>
        <span class="toggle-dot"></span>
        🇷🇺 Ruské trasy
      </label>
      <label class="toggle-label refinery">
        <input type="checkbox" data-layer="refinery" checked/>
        <span class="toggle-dot"></span>
        🏭 Rafinerie
      </label>
    </div>
  </header>

  <!-- ── MAP ─────────────────────────────────────────────────────────────────── -->
  <div id="map"></div>

  <!-- ── BOTTOM PANEL ────────────────────────────────────────────────────────── -->
  <div class="bottom-panel">

    <div class="detail-panel">
      <h3>Detail</h3>
      <div id="detail-content"></div>
    </div>

    <div class="chart-panel">
      <h3>Dodavatelé ropy do EU — % podíl</h3>
      <div class="slider-row">
        <label>Rok:</label>
        <input type="range" id="year-slider" min="2022" max="2025" value="2025" step="1"/>
        <span id="year-display">2025</span>
      </div>
      <div class="chart-wrap">
        <canvas id="eu-chart"></canvas>
      </div>
    </div>

  </div>

  <!-- ── DATA FILES ──────────────────────────────────────────────────────────── -->
  <script src="data/oil_fields.js"></script>
  <script src="data/gas_pipelines.js"></script>
  <script src="data/oil_pipelines.js"></script>
  <script src="data/tanker_routes.js"></script>
  <script src="data/refineries.js"></script>

  <!-- ── APP ─────────────────────────────────────────────────────────────────── -->
  <script src="app.js"></script>

</body>
</html>
